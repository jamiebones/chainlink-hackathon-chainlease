# workflow.yaml
# Workflow definition for ChainLease lease notification workflow

name: lease-notification-workflow
version: 1.0.0
description: Sends email notifications to tenants when leases are activated

# Workflow targets for simulation and deployment
staging-settings:
  user-workflow:
    workflow-name: "lease-notification-workflow-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: ""

production-settings:
  user-workflow:
    workflow-name: "lease-notification-workflow-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: ""
